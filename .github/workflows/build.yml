name: Build releases

# Triggers:
# - Push a git tag like v1.0.1 → builds Mac+Windows, attaches binaries to a Release
# - Manual run from Actions tab (workflow_dispatch) — for testing without tagging
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Windows .exe (NSIS installer)
  # ────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install
        shell: bash

      - name: Build .exe (NSIS installer)
        run: npx electron-builder --win --x64 --publish never
        shell: bash

      - name: Upload artifact (for non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: Fr1Ge-STUDIO-Windows
          path: dist/*.exe
          if-no-files-found: error

      - name: Attach to Release (for tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.exe.blockmap

  # ────────────────────────────────────────────────────────────────────────
  # Mac DMG (universal — both arm64 and x64). Optional: ти вже білдиш локально,
  # але якщо хочеш щоб тільки тег запускав — відкоментуй.
  # ────────────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build DMG (arm64 + x64)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --arm64 --x64 --publish never

      - name: Upload artifact (for non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: Fr1Ge-STUDIO-macOS
          path: dist/*.dmg
          if-no-files-found: error

      - name: Attach to Release (for tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.dmg.blockmap
